name: CI

on:
  push:
    branches: [development]
  pull_request:
    branches: [development, main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Checkout OrionServerBE
        uses: actions/checkout@v4
        with:
          repository: OrionBedrock/OrionServerBE
          ref: ${{ github.event.pull_request.base.ref || github.ref_name }}
          path: OrionServerBE

      - name: Checkout orion:containers
        uses: actions/checkout@v4
        with:
          repository: OrionBedrock/orion-containers
          ref: ${{ github.event.pull_request.base.ref || github.ref_name }}
          path: orion:containers

      - name: Checkout orion:inventory
        uses: actions/checkout@v4
        with:
          repository: OrionBedrock/orion-inventory
          ref: ${{ github.event.pull_request.base.ref || github.ref_name }}
          path: orion:inventory

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: >
          dotnet build OrionBlockContainers.csproj -c Release
          -p:OrionServerBERoot=$GITHUB_WORKSPACE/OrionServerBE
          -p:PluginsSiblingRoot=$GITHUB_WORKSPACE
