name: CI

on:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]

jobs:
  build-test-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Checkout OrionServerBE
        uses: actions/checkout@v4
        with:
          repository: OrionBedrock/OrionServerBE
          ref: development
          path: OrionServerBE
      - name: Checkout orion-containers
        uses: actions/checkout@v4
        with:
          repository: yPerfectBR/orion-containers
          ref: integration
          path: deps/orion-containers

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Pack Orion SDK from server checkout
        run: bash scripts/ci-setup-server-sdk.sh

      - name: Build orion-containers
        working-directory: deps/orion-containers
        run: |
          rm -rf "$HOME/.cache/orion-plugin-build"
          dotnet restore OrionContainers.csproj --configfile "$GITHUB_WORKSPACE/plugin/nuget.config" --force-evaluate
          dotnet build OrionContainers.csproj -c Release --configfile "$GITHUB_WORKSPACE/plugin/nuget.config" --no-restore

      - name: Link colon path for inventory ProjectReference
        run: ln -sfn "$GITHUB_WORKSPACE/deps/orion-containers" "$GITHUB_WORKSPACE/deps/orion:containers"

      - name: Checkout orion-inventory
        uses: actions/checkout@v4
        with:
          repository: yPerfectBR/orion-inventory
          ref: integration
          path: deps/orion-inventory

      - name: Build orion-inventory
        working-directory: deps/orion-inventory
        run: |
          rm -rf "$HOME/.cache/orion-plugin-build"
          dotnet restore OrionInventory.csproj /p:PluginsSiblingRoot="$GITHUB_WORKSPACE/deps" --configfile "$GITHUB_WORKSPACE/plugin/nuget.config" --force-evaluate
          dotnet build OrionInventory.csproj -c Release /p:PluginsSiblingRoot="$GITHUB_WORKSPACE/deps" --configfile "$GITHUB_WORKSPACE/plugin/nuget.config" --no-restore

      - name: Build plugin
        run: |
          rm -rf "$HOME/.cache/orion-plugin-build"
          dotnet restore OrionBlockContainers.csproj /p:PluginsSiblingRoot="$GITHUB_WORKSPACE/deps" --configfile nuget.config --force-evaluate
          dotnet build OrionBlockContainers.csproj -c Release /p:PluginsSiblingRoot="$GITHUB_WORKSPACE/deps" --configfile nuget.config --no-restore

      - name: Unit tests
        run: |
          dotnet restore tests/Orion.Plugins.BlockContainers.Tests/Orion.Plugins.BlockContainers.Tests.csproj --configfile nuget.config --force-evaluate
          dotnet test tests/Orion.Plugins.BlockContainers.Tests/Orion.Plugins.BlockContainers.Tests.csproj -c Release --no-restore --verbosity minimal

      - name: Smoke boot server with plugin
        env:
          PLUGIN_DEP_DIRS: ${{ github.workspace }}/deps/orion-containers ${{ github.workspace }}/deps/orion-inventory
        run: bash scripts/ci-smoke-server.sh
